<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SailReady — prototype</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root { --bg:#0d1b2a; --panel:#1b263b; --text:#e0e1dd; --muted:#9fb0c3; --accent:#4cc9f0; }
  * { box-sizing:border-box; margin:0; }
  body { font-family:-apple-system,system-ui,sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; }
  header { padding:10px 16px; background:var(--panel); display:flex; align-items:center; gap:12px; }
  header h1 { font-size:18px; } header .tag { color:var(--muted); font-size:12px; }
  main { flex:1; display:flex; min-height:0; }
  #sidebar { width:420px; min-width:300px; max-width:760px; overflow-y:auto; background:var(--panel); padding:14px; display:flex; flex-direction:column; gap:14px; }
  #dragbar { width:6px; cursor:col-resize; background:#2b3f5c; flex:none; }
  #dragbar:hover { background:var(--accent); }
  #map { flex:1; }
  .measure { display:flex; justify-content:space-between; font-size:12.5px; padding:3px 6px; border-radius:4px; background:#22324a; margin-bottom:4px; }
  h2 { font-size:13px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:6px; }
  select,input,button,textarea { width:100%; padding:8px; border-radius:6px; border:1px solid #3a506b; background:#0d1b2a; color:var(--text); font-size:14px; }
  button { cursor:pointer; background:#274060; border:none; font-weight:600; }
  button.primary { background:var(--accent); color:#06283d; }
  button:disabled { opacity:.45; cursor:default; }
  .row { display:flex; gap:8px; } .row > * { flex:1; }
  .trip-item { padding:8px 10px; border-radius:6px; background:#22324a; margin-bottom:6px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; }
  .trip-item:hover { background:#2b3f5c; } .trip-item.sel { outline:2px solid var(--accent); }
  .badge { font-weight:700; padding:2px 8px; border-radius:10px; font-size:13px; background:#444; }
  .score-big { font-size:44px; font-weight:800; text-align:center; padding:6px 0; }
  .g { color:#52d273; } .y { color:#ffd166; } .o { color:#ff9442; } .r { color:#ff5d5d; }
  .bg-g { background:#1d4a2a; } .bg-y { background:#4a431d; } .bg-o { background:#4a311d; } .bg-r { background:#4a1d1d; }
  .driver { padding:6px 8px; border-left:3px solid; border-radius:4px; background:#22324a; margin-bottom:5px; font-size:12.5px; }
  .driver.violation { border-color:#ff5d5d; } .driver.warning { border-color:#ffd166; } .driver.ok { border-color:#52d273; }
  .kv { display:flex; justify-content:space-between; font-size:13px; padding:2px 0; }
  .kv span:first-child { color:var(--muted); }
  table { width:100%; font-size:12px; border-collapse:collapse; }
  td,th { padding:3px 4px; text-align:right; border-bottom:1px solid #2b3f5c; } th:first-child, td:first-child { text-align:left; }
  .hint { color:var(--muted); font-size:12px; }
  .sug { background:#1d3a4a; padding:6px 8px; border-radius:4px; font-size:12.5px; margin-bottom:5px; border-left:3px solid var(--accent); }
  #newTripForm { display:none; flex-direction:column; gap:8px; }
  label { font-size:12px; color:var(--muted); }
</style>
</head>
<body>
<header>
  <h1>⛵ SailReady</h1><span class="tag">prototype — local dev</span>
  <span id="status" class="tag" style="margin-left:auto"></span>
</header>
<main>
  <div id="sidebar">
    <div>
      <h2>Trips</h2>
      <div id="tripList"></div>
      <button id="newTripBtn">+ New trip (click map to drop route pins)</button>
    </div>

    <form id="newTripForm">
      <h2>New Trip</h2>
      <span class="hint">Click the map to drop waypoints in order: first = departure, last = destination. At least 2 points.</span>
      <div class="kv"><span>Waypoints dropped</span><b id="wpCount">0</b></div>
      <label>Name</label><input id="tName" placeholder="Egmont Key Day Sail">
      <label>Boat</label><select id="tBoat"></select>
      <div class="row">
        <div><label>Departure</label><input id="tDep" type="datetime-local"></div>
        <div><label>Return by</label><input id="tRet" type="datetime-local"></div>
      </div>
      <label>Hours at destination</label><input id="tStay" type="number" value="2" min="0" step="0.5">
      <div class="row">
        <button type="button" id="tCancel">Cancel</button>
        <button type="button" id="tUndo">Undo pin</button>
        <button type="submit" class="primary">Create</button>
      </div>
    </form>

    <div id="scorePanel" style="display:none">
      <h2>Go / No-Go</h2>
      <div id="scoreBig" class="score-big">—</div>
      <button id="scoreBtn" class="primary">Score this trip now</button>
      <div id="scoreMeta" style="margin-top:8px"></div>
      <div id="suggestions" style="margin-top:8px"></div>
      <div id="measured" style="margin-top:8px"></div>
      <div id="drivers" style="margin-top:8px"></div>
      <div id="legs" style="margin-top:8px"></div>

      <div id="manage" style="margin-top:12px">
        <h2>Manage</h2>
        <div class="row">
          <button id="statusBtn"></button>
          <button id="redrawBtn">Redraw route</button>
          <button id="delBtn" style="background:#5c2330">Delete</button>
        </div>
        <div id="redrawBar" style="display:none; margin-top:6px">
          <span class="hint">Click map to drop new pins: <b id="redrawCount">0</b></span>
          <div class="row" style="margin-top:4px">
            <button id="redrawCancel">Cancel</button>
            <button id="redrawSave" class="primary">Save route</button>
          </div>
        </div>
        <button id="editToggle" style="margin-top:6px">Edit details</button>
        <form id="editForm" style="display:none; margin-top:6px; flex-direction:column; gap:6px">
          <label>Name</label><input id="eName">
          <div class="row">
            <div><label>Departure</label><input id="eDep" type="datetime-local"></div>
            <div><label>Return by</label><input id="eRet" type="datetime-local"></div>
          </div>
          <label>Hours at destination</label><input id="eStay" type="number" min="0" step="0.5">
          <button type="submit" class="primary">Save changes</button>
        </form>
      </div>
    </div>
  </div>
  <div id="dragbar"></div>
  <div id="map"></div>
</main>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const api = async (path, opts={}) => {
  const r = await fetch('/api/v1'+path, {headers:{'Content-Type':'application/json'}, ...opts});
  const j = await r.json();
  if (j.error) throw new Error(j.error.message);
  return j.data;
};
const $ = id => document.getElementById(id);
const status = m => { $('status').textContent = m; if(m) setTimeout(()=>{ if($('status').textContent===m) $('status').textContent=''; }, 6000); };

const map = L.map('map').setView([27.66, -82.55], 11);
const osm = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {attribution:'© OpenStreetMap'}).addTo(map);

// NOAA ENC official charts, served through our caching proxy: first view of a
// tile renders live at NOAA (slow), every view after that is local (fast).
const noaaEnc = L.tileLayer('/api/v1/charts/enc-tile/{z}/{x}/{y}.png',
  {attribution:'NOAA ENC', opacity:0.85, maxZoom:18, minZoom:3}).addTo(map);
const openSeaMap = L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png', {attribution:'© OpenSeaMap'});

L.control.layers(
  {}, // single base layer
  {'NOAA ENC charts': noaaEnc, 'OpenSeaMap seamarks': openSeaMap},
  {collapsed:false, position:'topright'}
).addTo(map);

let routeLayer = L.layerGroup().addTo(map);
let scoreLayer = L.layerGroup().addTo(map);
let selectedTrip = null;
let newTripPins = [];
let newTripMode = false;

const scoreClass = s => s>=80?'g':s>=60?'y':s>=40?'o':'r';
const fmtT = iso => new Date(iso).toLocaleString([], {weekday:'short', hour:'2-digit', minute:'2-digit'});

async function loadBoats() {
  const boats = await api('/boats');
  $('tBoat').innerHTML = boats.map(b=>`<option value="${b.id}">${b.name} (${b.make} ${b.model})</option>`).join('');
  return boats;
}

async function loadTrips() {
  const trips = await api('/trips');
  $('tripList').innerHTML = trips.map(t=>{
    const s = t.current_score;
    const badge = s==null ? '<span class="badge">unscored</span>'
      : `<span class="badge bg-${scoreClass(s)} ${scoreClass(s)}">${s}%</span>`;
    return `<div class="trip-item ${selectedTrip?.id===t.id?'sel':''}" data-id="${t.id}">
      <span>${t.name||'(unnamed)'}<br><small class="hint">${fmtT(t.departure_time)} · ${t.status}</small></span>${badge}</div>`;
  }).join('') || '<span class="hint">No trips yet.</span>';
  document.querySelectorAll('.trip-item').forEach(el =>
    el.onclick = () => selectTrip(el.dataset.id));
}

const LEG_MODE_LABEL = {auto:'Auto (engine decides)', motor:'Motor only', sail:'Sail only'};

function legModePopup(i, w, total) {
  if (i === total-1) return `<b>${w.name||'destination'}</b>`;
  const btns = ['auto','motor','sail'].map(m =>
    `<button onclick="setLegMode(${i},'${m}')" style="margin:2px;padding:4px 8px;cursor:pointer;${w.leg_mode===m?'font-weight:bold;outline:2px solid #4cc9f0;':''}">${m}</button>`
  ).join('');
  return `<b>${w.name||'waypoint '+i}</b><br>Leg ${i}→${i+1}: <b>${LEG_MODE_LABEL[w.leg_mode||'auto']}</b><br>${btns}`;
}

window.setLegMode = async (i, mode) => {
  if (!selectedTrip || selectedTrip.status !== 'planning') { status('Leg modes editable on planning trips only'); return; }
  const wps = selectedTrip.waypoints.map(w => ({lat:w.lat, lon:w.lon, name:w.name, leg_mode:w.leg_mode||'auto'}));
  wps[i].leg_mode = mode;
  try {
    await api(`/trips/${selectedTrip.id}/waypoints`, {method:'PUT', body: JSON.stringify({waypoints: wps})});
    await selectTrip(selectedTrip.id);
    status(`Leg ${i}→${i+1} set to ${mode} — re-score to update.`);
  } catch(e) { status('Failed: '+e.message); }
};

function drawRoute(waypoints) {
  routeLayer.clearLayers(); scoreLayer.clearLayers();
  if (!waypoints.length) return;
  const pts = waypoints.map(w=>[w.lat,w.lon]);
  L.polyline(pts, {color:'#4cc9f0', weight:3}).addTo(routeLayer);
  waypoints.forEach((w,i)=>{
    const kind = w.waypoint_type ?? (i===0?'start':i===waypoints.length-1?'destination':'intermediate');
    const m = L.circleMarker([w.lat,w.lon], {radius:6, color: kind==='start'?'#52d273':kind==='destination'?'#ff5d5d':'#4cc9f0', fillOpacity:.9})
      .bindTooltip(`${i}: ${w.name||kind}${w.leg_mode && w.leg_mode!=='auto' ? ' ['+w.leg_mode+'→]' : ''}`)
      .addTo(routeLayer);
    m.bindPopup(legModePopup(i, w, waypoints.length));
  });
  map.fitBounds(L.latLngBounds(pts).pad(0.25));
}

const MODE_COLOR = {motor:'#9aa5b1', sail:'#52d273', 'sail-tack':'#ffd166'};

function drawScoreOverlay(r) {
  scoreLayer.clearLayers();
  if (!selectedTrip || !selectedTrip.waypoints.length) return;
  const wp = o => selectedTrip.waypoints.find(w=>w.sequence_order===o);
  r.legs.forEach(l => {
    const a = wp(l.from_order), b = wp(l.to_order);
    if (!a || !b) return;
    L.polyline([[a.lat,a.lon],[b.lat,b.lon]], {
      color: MODE_COLOR[l.mode]||'#4cc9f0', weight: l.leg==='outbound'?5:3,
      dashArray: l.leg==='return'?'8 8':null, opacity:.9,
    }).bindTooltip(`${l.leg} ${l.from_order}→${l.to_order}: ${l.mode}${l.point_of_sail?' · '+l.point_of_sail:''} · ${l.sog_kts}kt SOG`).addTo(scoreLayer);
    // wind arrow at the midpoint of outbound legs, pointing where the wind blows TOWARD
    if (l.leg==='outbound' && l.wind_dir_deg!=null) {
      const mid = [(a.lat+b.lat)/2, (a.lon+b.lon)/2];
      const rot = (l.wind_dir_deg+180-90); // CSS rotate: glyph ➤ points right (090°)
      const gustTxt = l.wind_gust_kts!=null && l.wind_gust_kts > (l.wind_speed_kts||0)+1 ? ` G${Math.round(l.wind_gust_kts)}` : '';
      L.marker(mid, {icon: L.divIcon({className:'', iconSize:[40,20], html:
        `<div style="transform:rotate(${rot}deg);font-size:18px;color:#4cc9f0;text-shadow:0 0 3px #000">➤</div>`+
        `<div style="font-size:10px;color:#fff;text-shadow:0 0 3px #000;white-space:nowrap">${Math.round(l.wind_speed_kts||0)}kt${gustTxt}</div>`
      }), interactive:false}).addTo(scoreLayer);
    }
  });
}

async function selectTrip(id) {
  selectedTrip = await api('/trips/'+id);
  newTripMode=false; redrawMode=false; $('newTripForm').style.display='none';
  $('scorePanel').style.display='block';
  drawRoute(selectedTrip.waypoints);
  renderScoreSummary();
  renderManage();
  loadTrips();
  // reload the persisted report so clicking away never loses the detail
  try {
    const history = await api(`/trips/${id}/scores`);
    const current = history.find(h => h.is_current);
    if (current) renderScore(current);
  } catch(e) { /* no score yet */ }
}

function renderManage() {
  const st = selectedTrip.status;
  $('statusBtn').style.display = (st==='planning'||st==='active') ? '' : 'none';
  $('statusBtn').textContent = st==='planning' ? 'Activate' : 'Mark completed';
  $('redrawBtn').style.display = st==='planning' ? '' : 'none';
  $('editToggle').style.display = st==='planning' ? '' : 'none';
  $('editForm').style.display = 'none';
  $('redrawBar').style.display = 'none';
}

$('delBtn').onclick = async () => {
  if (!selectedTrip || !confirm(`Delete "${selectedTrip.name||'this trip'}"?`)) return;
  await api('/trips/'+selectedTrip.id, {method:'DELETE'});
  selectedTrip = null; $('scorePanel').style.display='none'; routeLayer.clearLayers();
  loadTrips(); status('Trip deleted.');
};

$('statusBtn').onclick = async () => {
  const next = selectedTrip.status==='planning' ? 'active' : 'completed';
  try { await api(`/trips/${selectedTrip.id}/status`, {method:'PUT', body:JSON.stringify({status:next})});
        await selectTrip(selectedTrip.id); }
  catch(e) { status(e.message); }
};

const isoToLocal = iso => { const d=new Date(iso); d.setMinutes(d.getMinutes()-d.getTimezoneOffset()); return d.toISOString().slice(0,16); };

$('editToggle').onclick = () => {
  const f = $('editForm');
  if (f.style.display==='none') {
    f.style.display='flex';
    $('eName').value = selectedTrip.name||'';
    $('eDep').value = isoToLocal(selectedTrip.departure_time);
    $('eRet').value = isoToLocal(selectedTrip.return_by_time);
    $('eStay').value = selectedTrip.time_at_destination_hrs;
  } else f.style.display='none';
};

$('editForm').onsubmit = async e => {
  e.preventDefault();
  try {
    await api('/trips/'+selectedTrip.id, {method:'PUT', body: JSON.stringify({
      boat_id: selectedTrip.boat_id,
      name: $('eName').value || null,
      departure_location: selectedTrip.departure_location,
      destination_location: selectedTrip.destination_location,
      departure_time: new Date($('eDep').value).toISOString(),
      return_by_time: new Date($('eRet').value).toISOString(),
      time_at_destination_hrs: +$('eStay').value,
    })});
    await selectTrip(selectedTrip.id); status('Saved — re-score to update.');
  } catch(err) { status('Save failed: '+err.message); }
};

let redrawMode = false;
$('redrawBtn').onclick = () => {
  redrawMode = true; newTripPins = []; routeLayer.clearLayers();
  $('redrawBar').style.display=''; $('redrawCount').textContent='0';
};
$('redrawCancel').onclick = () => { redrawMode=false; $('redrawBar').style.display='none'; drawRoute(selectedTrip.waypoints); };
$('redrawSave').onclick = async () => {
  if (newTripPins.length < 2) { status('Need at least 2 pins'); return; }
  try {
    await api(`/trips/${selectedTrip.id}/waypoints`, {method:'PUT', body: JSON.stringify({waypoints:newTripPins})});
    redrawMode=false; $('redrawBar').style.display='none';
    await selectTrip(selectedTrip.id); status('Route updated — re-score to update.');
  } catch(e) { status('Route save failed: '+e.message); }
};

function renderScoreSummary() {
  const s = selectedTrip.current_score;
  $('scoreBig').textContent = s==null?'—':s+'%';
  $('scoreBig').className = 'score-big '+(s==null?'':scoreClass(s));
  $('scoreMeta').innerHTML = ''; $('drivers').innerHTML=''; $('legs').innerHTML=''; $('suggestions').innerHTML=''; $('measured').innerHTML='';
  $('scoreBtn').disabled = !selectedTrip.waypoints.length;
  if (!selectedTrip.waypoints.length)
    $('scoreMeta').innerHTML = '<span class="hint">This trip has no route waypoints.</span>';
}

const MEASURE_LABELS = {
  max_wind_kts: ['Max wind', 'kt'],
  max_gust_kts: ['Max gusts', 'kt'],
  max_wave_ft: ['Max waves', 'ft'],
  max_rain_prob_pct: ['Max rain chance', '%'],
  max_adverse_current_kts: ['Max adverse current', 'kt'],
  window_hours: ['Time needed', 'h'],
};

function renderMeasured(summary) {
  const rows = Object.entries(summary || {}).map(([key, m]) => {
    const [label, unit] = MEASURE_LABELS[key] || [key, ''];
    if (m.value == null) return `<div class="measure"><span>${label}</span><span class="hint">no data</span></div>`;
    const ratio = m.limit ? m.value / m.limit : 0;
    const cls = ratio > 1 ? 'r' : ratio >= 0.85 ? 'y' : 'g';
    const icon = ratio > 1 ? '⛔' : ratio >= 0.85 ? '⚠️' : '✓';
    return `<div class="measure"><span>${label}</span>
      <b class="${cls}">${icon} ${m.value}${unit} <span class="hint">/ limit ${m.limit}${unit}</span></b></div>`;
  }).join('');
  $('measured').innerHTML = rows ? '<h2>Measured along your route</h2>'+rows : '';
}

const deg = d => d==null ? '–' : Math.round(d)+'°';
const num = (v,unit='') => v==null ? '–' : v+unit;

function renderScore(r) {
  $('scoreBig').textContent = r.score+'%';
  $('scoreBig').className = 'score-big '+scoreClass(r.score);
  $('scoreMeta').innerHTML = `
    <div class="kv"><span>Feasible</span><b class="${r.feasible?'g':'r'}">${r.feasible?'YES':'NO'}</b></div>
    <div class="kv"><span>Arrive destination</span><b>${r.outbound_arrival?fmtT(r.outbound_arrival):'–'}</b></div>
    <div class="kv"><span>Back home</span><b>${r.return_home?fmtT(r.return_home):'–'}</b></div>
    <div class="kv"><span>Turn-around deadline</span><b>${r.turn_around_deadline?fmtT(r.turn_around_deadline):'n/a'}</b></div>
    <div class="kv"><span>Max reachable distance</span><b>${r.max_reachable_distance_nm??'—'} nm</b></div>
    ${r.scored_at ? `<div class="kv"><span>Scored</span><b>${fmtT(r.scored_at)}</b></div>` : ''}`;
  $('suggestions').innerHTML = r.suggestions.map(s=>`<div class="sug">💡 ${s.description}</div>`).join('');
  renderMeasured(r.conditions_summary);
  $('drivers').innerHTML = '<h2>Drivers</h2>' + (r.drivers.map(d=>
    `<div class="driver ${d.severity}">${d.severity==='violation'?'⛔':d.severity==='warning'?'⚠️':'ℹ️'} ${d.description}${d.is_interpolated?' <i>(interpolated)</i>':''}</div>`
  ).join('') || '<div class="driver ok">All checks within limits.</div>');
  $('legs').innerHTML = '<h2>Legs — everything sampled</h2><table>'+
    '<tr><th>Leg</th><th>Dep</th><th>Crs</th><th>Steer</th><th>nm</th><th>Wind</th><th>∠</th><th>Wave</th><th>Rain</th><th>Cur±</th><th>Boat</th><th>SOG</th><th>Mode</th></tr>'+
    r.legs.map(l=>{
      const gust = l.wind_gust_kts!=null && l.wind_gust_kts > (l.wind_speed_kts||0)+1 ? `<small class="o"> G${Math.round(l.wind_gust_kts)}</small>` : '';
      const wind = l.wind_speed_kts!=null ? `${Math.round(l.wind_speed_kts)}kt@${deg(l.wind_dir_deg)}${gust}` : '–';
      const angle = l.wind_angle_deg!=null ? `${Math.abs(l.wind_angle_deg)}°${l.wind_angle_deg>=0?'S':'P'}` : '–';
      const pos = l.point_of_sail ? `<br><small class="hint">${l.point_of_sail}</small>` : '';
      const cur = l.current_along_kts ? `${l.current_along_kts>0?'+':''}${l.current_along_kts}${l.current_is_interpolated?'*':''}` : '0';
      const steer = l.mode==='sail-tack' ? `<b>tack ${l.tack_headings}</b>` : (l.cts_deg!=null ? deg(l.cts_deg) : '–');
      const modeIcon = (l.mode==='sail'?'⛵':l.mode==='sail-tack'?'⛵⇄':'⚙️') + (l.leg_mode!=='auto'?'<br><small class="hint">forced</small>':'');
      return `<tr><td>${l.leg==='outbound'?'▸':'◂'} ${l.from_order}→${l.to_order}</td><td>${new Date(l.start).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</td>`+
        `<td>${deg(l.course_deg)}</td><td>${steer}</td><td>${l.distance_nm}</td><td>${wind}</td><td>${angle}${pos}</td><td>${num(l.wave_height_ft,"'")}</td>`+
        `<td>${num(l.rain_prob_pct,'%')}</td><td>${cur}</td><td>${l.boat_speed_kts}</td><td><b>${l.sog_kts}</b></td><td>${modeIcon}</td></tr>`;
    }).join('')+'</table>'+
    '<span class="hint">Crs = rhumb course (true). Steer = crab-corrected; beating (⛵⇄) shows tack headings, Boat = VMG. ∠ = wind angle off bow (S = starboard, P = port) + point of sail. Cur± = current along course (+ fair / − foul, * interpolated). Click a waypoint on the map to force motor/sail for its leg.</span>';
  drawScoreOverlay(r);
}

$('scoreBtn').onclick = async () => {
  if (!selectedTrip) return;
  $('scoreBtn').disabled = true; $('scoreBtn').textContent = 'Scoring (fetching forecasts)…';
  try {
    const r = await api(`/trips/${selectedTrip.id}/score`, {method:'POST'});
    renderScore(r); loadTrips();
  } catch(e) { status('Score failed: '+e.message); }
  $('scoreBtn').disabled = false; $('scoreBtn').textContent = 'Score this trip now';
};

// --- new trip flow ---
$('newTripBtn').onclick = async () => {
  newTripMode = true; newTripPins = []; redrawMode = false;
  routeLayer.clearLayers(); scoreLayer.clearLayers(); // blank canvas — no leftover trip
  selectedTrip = null; $('scorePanel').style.display='none';
  $('newTripForm').style.display='flex'; $('wpCount').textContent='0';
  const now = new Date(); now.setDate(now.getDate()+1); now.setHours(9,0,0,0);
  $('tDep').value = now.toISOString().slice(0,16);
  now.setHours(17); $('tRet').value = now.toISOString().slice(0,16);
  await loadBoats();
};
$('tCancel').onclick = () => { newTripMode=false; newTripPins=[]; routeLayer.clearLayers(); scoreLayer.clearLayers(); $('newTripForm').style.display='none'; };
$('tUndo').onclick = () => { newTripPins.pop(); redrawPins(); };

function redrawPins() {
  drawRouteFromPins();
  $('wpCount').textContent = newTripPins.length;
  $('redrawCount').textContent = newTripPins.length;
}
function drawRouteFromPins() {
  routeLayer.clearLayers();
  if (!newTripPins.length) return;
  L.polyline(newTripPins.map(p=>[p.lat,p.lon]), {color:'#4cc9f0', dashArray:'6 6'}).addTo(routeLayer);
  newTripPins.forEach((p,i)=> L.circleMarker([p.lat,p.lon],{radius:6,color:i===0?'#52d273':'#4cc9f0',fillOpacity:.9}).addTo(routeLayer));
}
map.on('click', e => {
  if (!newTripMode && !redrawMode) return;
  newTripPins.push({lat:+e.latlng.lat.toFixed(5), lon:+e.latlng.lng.toFixed(5)});
  redrawPins();
});

$('newTripForm').onsubmit = async e => {
  e.preventDefault();
  if (newTripPins.length < 2) { status('Drop at least 2 pins (start + destination)'); return; }
  try {
    const dep = new Date($('tDep').value), ret = new Date($('tRet').value);
    const trip = await api('/trips', {method:'POST', body: JSON.stringify({
      boat_id: $('tBoat').value,
      name: $('tName').value || null,
      departure_location: newTripPins[0],
      destination_location: newTripPins[newTripPins.length-1],
      departure_time: dep.toISOString(),
      return_by_time: ret.toISOString(),
      time_at_destination_hrs: +$('tStay').value,
    })});
    await api(`/trips/${trip.id}/waypoints`, {method:'PUT', body: JSON.stringify({waypoints:newTripPins})});
    newTripMode=false; newTripPins=[]; $('newTripForm').style.display='none';
    await loadTrips(); await selectTrip(trip.id);
    status('Trip created — hit Score.');
  } catch(err) { status('Create failed: '+err.message); }
};

// --- resizable sidebar ---
let dragging = false;
$('dragbar').addEventListener('mousedown', () => { dragging = true; document.body.style.userSelect = 'none'; });
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  $('sidebar').style.width = Math.min(760, Math.max(300, e.clientX)) + 'px';
});
window.addEventListener('mouseup', () => {
  if (dragging) { dragging = false; document.body.style.userSelect = ''; map.invalidateSize(); }
});

loadBoats(); loadTrips();
</script>
</body>
</html>
