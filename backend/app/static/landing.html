<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SailReady — Plan the sail. Sail the plan.</title>
<meta name="description" content="The trip-planning engine that watches your weather window — wind, tide, current, depth, and the trip home.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cpolygon points='12,46 27,20 27,46' fill='%2352d273'/%3E%3Cpolygon points='31,46 31,10 52,46' fill='%234cc9f0'/%3E%3Cpath d='M8 53 q8 -5 16 0 t16 0 t16 0' stroke='%233a506b' stroke-width='3.5' fill='none' stroke-linecap='round'/%3E%3C/svg%3E">
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  :root { --bg:#0d1b2a; --text:#e0e1dd; --muted:#9fb0c3; --accent:#4cc9f0; --green:#52d273; }
  html, body { height:100%; }
  body {
    font-family:-apple-system, system-ui, "Segoe UI", sans-serif;
    color:var(--text);
    background: radial-gradient(120% 90% at 50% 0%, #14283f 0%, #0d1b2a 55%, #081220 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    overflow:hidden; position:relative;
  }
  .hero { text-align:center; padding:24px; z-index:2; max-width:680px; }
  .logo { width:110px; height:110px; margin-bottom:10px; animation:bob 5.5s ease-in-out infinite; }
  @keyframes bob { 0%,100%{transform:translateY(0) rotate(-1.2deg)} 50%{transform:translateY(-9px) rotate(1.2deg)} }
  h1 { font-size:52px; font-weight:800; letter-spacing:-.02em; }
  h1 .lite { font-weight:250; }
  .motto { margin-top:6px; font-size:20px; font-style:italic; color:var(--accent); letter-spacing:.01em; }
  .blurb { margin:22px auto 0; font-size:15.5px; line-height:1.65; color:var(--muted); max-width:520px; }
  .blurb b { color:var(--text); font-weight:600; }
  .cta {
    display:inline-flex; align-items:center; gap:10px; margin-top:34px;
    padding:13px 30px; border-radius:12px; border:none; cursor:pointer;
    font-size:16px; font-weight:700; text-decoration:none; color:#04263b;
    background:linear-gradient(135deg, #4cc9f0, #3a86ff);
    box-shadow:0 6px 28px rgba(76,201,240,.35);
    transition:transform .15s, box-shadow .15s;
  }
  .cta:hover { transform:translateY(-2px); box-shadow:0 10px 34px rgba(76,201,240,.45); }
  .cta svg { flex:none; }
  .verdicts { margin-top:38px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
  .chip { font-size:12.5px; font-weight:600; padding:6px 13px; border-radius:999px; border:1px solid #2b3f5c; color:var(--muted); background:rgba(27,38,59,.6); }
  .chip.g { color:#52d273; border-color:#2a5c3a; } .chip.y { color:#ffd166; border-color:#5c532a; }
  .chip.o { color:#ff9442; border-color:#5c452a; } .chip.r { color:#ff8da0; border-color:#5c2a38; }
  footer { position:absolute; bottom:18px; width:100%; text-align:center; font-size:12px; color:#5b7089; z-index:2; }
  /* layered waves */
  .waves { position:absolute; bottom:0; left:0; width:200%; height:160px; z-index:1; opacity:.5; }
  .waves path { animation:drift 14s linear infinite; }
  .waves .w2 { animation-duration:22s; opacity:.5; }
  @keyframes drift { from{transform:translateX(0)} to{transform:translateX(-50%)} }
  @media (max-width:540px){ h1{font-size:38px} .motto{font-size:17px} .logo{width:84px;height:84px} }
</style>
</head>
<body>

<div class="hero">
  <svg class="logo" viewBox="0 0 64 64" aria-hidden="true">
    <polygon points="12,46 27,20 27,46" fill="#52d273"/>
    <polygon points="31,46 31,10 52,46" fill="#4cc9f0"/>
    <path d="M8 53 q8 -5 16 0 t16 0 t16 0" stroke="#3a506b" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  </svg>

  <h1><span class="lite">sail</span>ready</h1>
  <div class="motto">Plan the sail. Sail the plan.</div>

  <p class="blurb">
    The trip-planning engine that watches your weather window —
    <b>wind, gusts, tide, current, and charted depth</b>, sampled where you'll be,
    <b>when you'll be there</b>.
  </p>

  <a class="cta" href="/app/">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#04263b" d="M44.5 20H24v8.5h11.8C34.7 33.9 30.1 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22c11 0 21-8 21-22 0-1.3-.2-2.7-.5-4z"/></svg>
    Sign in with Google
  </a>

</div>

<svg class="waves" viewBox="0 0 1200 160" preserveAspectRatio="none" aria-hidden="true">
  <path d="M0 90 q75 -34 150 0 t150 0 t150 0 t150 0 t150 0 t150 0 t150 0 t150 0 V160 H0 Z" fill="#13243a"/>
  <path class="w2" d="M0 118 q100 -26 200 0 t200 0 t200 0 t200 0 t200 0 t200 0 V160 H0 Z" fill="#0a1626"/>
</svg>

<footer>Invite-only beta · sailready.ai</footer>

</body>
</html>
